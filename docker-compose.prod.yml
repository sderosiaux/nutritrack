name: nutritrack-prod

# Production Docker Compose — NutriTrack
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Key differences from docker-compose.yml (dev):
#   - App built from production Dockerfile (multi-stage, non-root user)
#   - No bind-mount volume for source code
#   - No external ports for postgres/redis/minio (internal network only)
#   - Nginx reverse proxy handles all external traffic (ports 80/443)
#   - Postgres/Redis tuned for production workloads

services:
  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nutritrack-net

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nutritrack:${POSTGRES_PASSWORD}@postgres:5432/nutritrack
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: nutritrack
      MINIO_USE_SSL: "false"
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - nutritrack-net

  # ── PostgreSQL 16 (internal only — no external port) ──────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nutritrack
      # Production tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    environment:
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutritrack_prod}
      POSTGRES_DB: nutritrack
      # PostgreSQL production tuning
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c max_connections=50
        -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — accessible only within nutritrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritrack -d nutritrack"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - nutritrack-net

  # ── Redis 7 (internal only — no external port) ────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --appendonly yes
    volumes:
      - redis_data:/data
    # No external port — accessible only within nutritrack-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - nutritrack-net

  # ── MinIO (internal only — no external port) ──────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    # No external port for S3 API (9000) — only accessible within nutritrack-net
    # MinIO console (9001) also internal — access via ssh tunnel if needed
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - nutritrack-net

networks:
  nutritrack-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:

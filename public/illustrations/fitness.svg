<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Dumbbell -->
  <rect x="120" y="85" rx="4" ry="4" width="30" height="30" fill="#16a34a" opacity="0.3"/>
  <rect x="250" y="85" rx="4" ry="4" width="30" height="30" fill="#16a34a" opacity="0.3"/>
  <rect x="150" y="93" rx="3" ry="3" width="100" height="14" fill="#16a34a" opacity="0.2"/>
  <!-- Heart rate line -->
  <polyline points="60,145 100,145 120,145 135,120 145,160 155,130 165,150 175,145 220,145 240,145 255,120 265,160 275,130 285,150 295,145 340,145" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Upward trend dots -->
  <circle cx="100" cy="60" r="4" fill="#16a34a" opacity="0.15"/>
  <circle cx="140" cy="52" r="4" fill="#16a34a" opacity="0.2"/>
  <circle cx="180" cy="46" r="4" fill="#16a34a" opacity="0.25"/>
  <circle cx="220" cy="42" r="4" fill="#16a34a" opacity="0.3"/>
  <circle cx="260" cy="38" r="5" fill="#16a34a" opacity="0.35"/>
  <circle cx="300" cy="32" r="5" fill="#16a34a" opacity="0.4"/>
  <!-- Trend line -->
  <line x1="100" y1="60" x2="300" y2="32" stroke="#16a34a" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <!-- Decorative -->
  <circle cx="360" cy="170" r="14" fill="#f59e0b" opacity="0.08"/>
  <circle cx="40" cy="40" r="10" fill="#16a34a" opacity="0.06"/>
</svg>
